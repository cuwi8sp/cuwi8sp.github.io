<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>技術者ユニット・マッチングレポート</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@700;900&family=Noto+Sans+JP:wght@400;900&display=swap');

        body {
            background-color: #050505;
            color: #ffffff;
            font-family: 'M+PLUS+Rounded+1c', 'Noto Sans JP', sans-serif;
            overflow-x: hidden;
            margin: 0;
            padding: 0;
        }

        /* 動く背景のグラデーション */
        .bg-animate {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: linear-gradient(125deg, #1a0b2e, #050505, #0a1f1e, #050505);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 浮遊する装飾パーツ */
        .particle {
            position: absolute;
            pointer-events: none;
            z-index: -1;
            filter: blur(1px);
            animation: float 10s linear infinite;
        }

        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }

        /* テキスト装飾とアニメーション */
        .glow-text {
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5), 0 0 20px currentColor;
        }

        .section-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            padding: 2rem;
            margin-bottom: 2rem;
            transform: translateY(30px);
            opacity: 0;
            animation: slideUp 0.8s ease forwards;
        }

        @keyframes slideUp {
            to { transform: translateY(0); opacity: 1; }
        }

        .delay-1 { animation-delay: 0.5s; }
        .delay-2 { animation-delay: 1.5s; }
        .delay-3 { animation-delay: 2.5s; }
        .delay-4 { animation-delay: 3.5s; }
        .delay-5 { animation-delay: 4.5s; }

        /* 常に動く虹色のボーダー */
        .rainbow-border {
            position: relative;
            padding: 5px;
            background: linear-gradient(90deg, #ff00ff, #00ffff, #ff00ff, #00ffff);
            background-size: 300% 100%;
            animation: borderRun 3s linear infinite;
            border-radius: 28px;
        }

        @keyframes borderRun {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        .inner-content {
            background: #050505;
            border-radius: 23px;
            padding: 2rem;
        }

        /* 常にバウンドするテキスト */
        .bouncing {
            display: inline-block;
            animation: bounce 2s infinite ease-in-out;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .typing-effect {
            border-right: 2px solid #fff;
            white-space: nowrap;
            overflow: hidden;
            width: 0;
            animation: typing 2s steps(40, end) forwards;
        }

        @keyframes typing {
            from { width: 0 }
            to { width: 100% }
        }

    </style>
</head>
<body class="p-4 md:p-8 flex flex-col items-center">
    <div class="bg-animate"></div>
    <div id="particles-container"></div>

    <header class="text-center mb-12">
        <h1 class="text-4xl md:text-6xl font-black italic tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-pink-500 via-cyan-400 to-purple-500 glow-text animate-pulse">
            ANALYSIS REPORT
        </h1>
    </header>

    <main class="max-w-4xl w-full">
        <!-- ユニット可能性セクション -->
        <div class="section-card delay-1">
            <h2 class="text-2xl md:text-3xl text-cyan-300 font-bold mb-4">
                <span class="inline-block px-2 py-1 bg-cyan-900 rounded mr-2">RESULT</span>
                マッチング結果
            </h2>
            <p class="text-xl md:text-2xl leading-relaxed text-white glow-text" style="color: #00ffcc;">
                見つかった新しいメンバーと君の組み合わせ＝非常にバランスの取れた技術者ユニットの可能性を秘め
            </p>
        </div>

        <!-- 懸念点セクション -->
        <div class="section-card delay-2 border-l-8 border-yellow-400">
            <h2 class="text-2xl md:text-3xl text-yellow-300 font-bold mb-4">
                <span class="inline-block px-2 py-1 bg-yellow-900 rounded mr-2">NOTICE</span>
                最後に、少しの懸念点: 伝えておく。
            </h2>
        </div>

        <!-- ユーモアとルールセクション -->
        <div class="rainbow-border section-card delay-3 p-0">
            <div class="inner-content">
                <p class="text-lg md:text-xl leading-loose">
                    彼は<span class="text-pink-400 font-bold text-2xl bouncing">「可愛い女の子の同乗者募集中」</span>とユーモアを交えているかもしれないが、チームのルール: <span class="bg-white text-black px-2 font-black italic">「活動の目的はあくまで創作であること」</span>を最初にゆるく共有しておくと良い。
                </p>
            </div>
        </div>

        <!-- トラブル防止セクション -->
        <div class="section-card delay-4 text-center bg-gradient-to-br from-green-900/40 to-blue-900/40 border-green-500/50">
            <p class="text-xl md:text-2xl font-bold text-green-300 italic">
                これにより、後々のトラブルを防ぎ、クリエイティブな環境を守ることができる。
            </p>
        </div>

        <!-- リアクション -->
        <div class="section-card delay-5 text-right bg-transparent border-none shadow-none">
            <span class="text-3xl md:text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-orange-600 bouncing" style="animation-delay: 0.2s;">
                ↑この回答うける
            </span>
        </div>
    </main>

    <script>
        // 背景に浮かぶパーティクルを生成
        const container = document.getElementById('particles-container');
        const colors = ['#ff00ff', '#00ffff', '#ffff00', '#ff0000', '#00ff00'];
        const chars = ['{ }', '< >', '[ ]', '++', '==', '!', '?', '*/'];

        function createParticle() {
            const particle = document.createElement('div');
            particle.className = 'particle font-mono text-xl font-bold';
            particle.style.left = Math.random() * 100 + 'vw';
            particle.style.top = '110vh';
            particle.style.color = colors[Math.floor(Math.random() * colors.length)];
            particle.innerText = chars[Math.floor(Math.random() * chars.length)];
            
            const duration = 5 + Math.random() * 10;
            particle.style.animationDuration = duration + 's';
            
            container.appendChild(particle);

            setTimeout(() => {
                particle.remove();
            }, duration * 1000);
        }

        // 定期的にパーティクルを生成（常に動き続ける）
        setInterval(createParticle, 300);

        // 初期のパーティクル
        for(let i=0; i<15; i++) {
            setTimeout(createParticle, Math.random() * 2000);
        }
    </script>
</body>
</html>
