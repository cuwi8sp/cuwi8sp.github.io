<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>確率重み付き抽選アプリ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
        }
        .number-display {
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .pop-animation {
            animation: pop 0.4s ease-out;
        }
        @keyframes pop {
            0% { transform: scale(0.8); opacity: 0; }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">

    <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-md text-center">
        <h1 class="text-2xl font-bold text-gray-800 mb-2">確率重み付き抽選</h1>
        <p class="text-sm text-gray-500 mb-8">
            1(高確率) から 10(低確率) の数字を抽選します
        </p>

        <!-- 結果表示エリア -->
        <div id="resultContainer" class="h-40 flex items-center justify-center mb-8 bg-gray-50 rounded-2xl border-2 border-dashed border-gray-200">
            <div id="numberDisplay" class="text-8xl font-black text-indigo-600 number-display">
                ?
            </div>
        </div>

        <!-- ボタン -->
        <button id="drawButton" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 px-6 rounded-xl shadow-lg transform active:scale-95 transition-all duration-150 text-xl">
            抽選する！
        </button>

        <!-- 確率表のトグル -->
        <div class="mt-8 text-left">
            <details class="text-sm text-gray-600">
                <summary class="cursor-pointer hover:text-indigo-600 font-medium">現在の確率設定を確認</summary>
                <div class="mt-3 p-4 bg-gray-50 rounded-lg overflow-x-auto">
                    <table class="w-full text-xs">
                        <thead>
                            <tr class="border-b">
                                <th class="py-1">数字</th>
                                <th class="py-1">比率</th>
                                <th class="py-1 text-right">推定確率</th>
                            </tr>
                        </thead>
                        <tbody id="probabilityTable">
                            <!-- JSで生成 -->
                        </tbody>
                    </table>
                </div>
            </details>
        </div>
    </div>

    <script>
        // 設定: 1(10) ~ 10(1) の比率を作成
        const weights = [];
        for (let i = 1; i <= 10; i++) {
            weights.push({ number: i, weight: 11 - i });
        }

        const totalWeight = weights.reduce((sum, item) => sum + item.weight, 0);

        // UI生成: 確率表
        const tableBody = document.getElementById('probabilityTable');
        weights.forEach(item => {
            const percentage = ((item.weight / totalWeight) * 100).toFixed(1);
            const row = `
                <tr class="border-b border-gray-100 last:border-0">
                    <td class="py-2 font-bold">${item.number}</td>
                    <td class="py-2 text-gray-400">${item.weight}</td>
                    <td class="py-2 text-right text-indigo-500 font-mono">${percentage}%</td>
                </tr>
            `;
            tableBody.innerHTML += row;
        });

        const drawButton = document.getElementById('drawButton');
        const numberDisplay = document.getElementById('numberDisplay');

        // 抽選ロジック
        function pickNumber() {
            const random = Math.random() * totalWeight;
            let currentSum = 0;

            for (const item of weights) {
                currentSum += item.weight;
                if (random <= currentSum) {
                    return item.number;
                }
            }
            return weights[0].number;
        }

        // クリックイベント
        drawButton.addEventListener('click', () => {
            // アニメーションのリセット
            numberDisplay.classList.remove('pop-animation');
            void numberDisplay.offsetWidth; // 強制再描画

            // 演出：少し遅らせて結果を表示
            numberDisplay.innerText = "...";
            drawButton.disabled = true;
            drawButton.classList.add('opacity-50');

            setTimeout(() => {
                const result = pickNumber();
                numberDisplay.innerText = result;
                numberDisplay.classList.add('pop-animation');
                drawButton.disabled = false;
                drawButton.classList.remove('opacity-50');
            }, 300);
        });
    </script>
</body>
</html>
