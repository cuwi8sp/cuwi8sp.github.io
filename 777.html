<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>3Dキューブ（CSS版）</title>
    <style>
        /* 全体のレイアウト設定 */
        body { 
            margin: 0; 
            display: flex; 
            height: 100vh; 
            font-family: sans-serif; 
            background-color: #222;
        }
        
        /* 左側の設定パネル */
        #sidebar { 
            width: 300px; 
            background: #333; 
            color: #eee; 
            padding: 20px; 
            overflow-y: auto; 
            box-sizing: border-box; 
            border-right: 2px solid #555;
        }
        
        #sidebar h2 { margin-top: 0; font-size: 1.2rem; color: #66b3ff; }
        #sidebar p { font-size: 0.8rem; color: #aaa; margin-bottom: 20px; }
        
        .face-setting { 
            margin-bottom: 15px; 
            background: #444; 
            padding: 10px; 
            border-radius: 8px; 
        }
        .face-setting label { 
            display: block; 
            margin-bottom: 8px; 
            font-size: 14px; 
            font-weight: bold;
        }
        .face-setting input[type="file"] { 
            width: 100%; 
            font-size: 12px;
        }

        /* 右側のキャンバス（録画エリア） */
        #canvas-area { 
            flex: 1; 
            background: #00ff00; /* グリーンバック */
            display: flex; 
            justify-content: center; 
            align-items: center; 
            overflow: hidden;
            perspective: 1000px; /* 3Dの奥行きを表現するCSS */
        }

        /* --- CSSで作る3Dキューブの構造 --- */
        .scene {
            width: 300px;
            height: 300px;
            /* 画面の中央に配置 */
        }

        .cube {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d; /* 子要素を3D空間に配置する設定 */
        }

        /* 各面の共通設定 */
        .face {
            position: absolute;
            width: 300px;
            height: 300px;
            background-size: cover; /* 画像を面にピッタリ合わせる */
            background-position: center;
            border: 2px solid rgba(255, 255, 255, 0.2); /* 境界線 */
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            font-weight: bold;
            color: rgba(255, 255, 255, 0.8);
            box-sizing: border-box;
        }

        /* 6つの面を3D空間の適切な位置に配置し、初期の背景色を設定 */
        .front  { transform: rotateY(  0deg) translateZ(150px); background-color: #e63946; } /* 赤 */
        .right  { transform: rotateY( 90deg) translateZ(150px); background-color: #457b9d; } /* 青 */
        .back   { transform: rotateY(180deg) translateZ(150px); background-color: #2a9d8f; } /* 緑 */
        .left   { transform: rotateY(-90deg) translateZ(150px); background-color: #f4a261; } /* 橙 */
        .top    { transform: rotateX( 90deg) translateZ(150px); background-color: #9c6644; } /* 茶 */
        .bottom { transform: rotateX(-90deg) translateZ(150px); background-color: #8338ec; } /* 紫 */
    </style>
</head>
<body>

    <!-- 左側の操作パネル -->
    <div id="sidebar">
        <h2>3Dキューブ（CSS版）</h2>
        <p>WebGLエラーを回避する特別版です。<br>画像をアップロードすると自動で正方形に切り抜かれます。</p>
        
        <div id="ui-container">
            <!-- JavaScriptでここにアップロードボタンを生成します -->
        </div>
    </div>

    <!-- 右側の録画エリア -->
    <div id="canvas-area">
        <div class="scene">
            <div class="cube" id="cube">
                <!-- 立方体の6つの面 -->
                <div class="face front">前面</div>
                <div class="face back">後面</div>
                <div class="face right">右面</div>
                <div class="face left">左面</div>
                <div class="face top">上面</div>
                <div class="face bottom">下面</div>
            </div>
        </div>
    </div>

    <script>
        // 1. 各面の設定データ
        const facesData = [
            { id: 'front', name: '前面 (Front)' },
            { id: 'back', name: '後面 (Back)' },
            { id: 'right', name: '右面 (Right)' },
            { id: 'left', name: '左面 (Left)' },
            { id: 'top', name: '上面 (Top)' },
            { id: 'bottom', name: '下面 (Bottom)' }
        ];

        // 2. 左側のアップロードUIを生成
        const uiContainer = document.getElementById('ui-container');
        facesData.forEach(face => {
            const div = document.createElement('div');
            div.className = 'face-setting';
            div.innerHTML = `
                <label>${face.name}</label>
                <input type="file" accept="image/*" data-face="${face.id}">
            `;
            uiContainer.appendChild(div);
        });

        // 3. 画像アップロード時の処理（正方形切り抜き）
        document.querySelectorAll('input[type="file"]').forEach(input => {
            input.addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (!file) return;

                const faceClass = this.getAttribute('data-face');
                const reader = new FileReader();

                reader.onload = function(event) {
                    const img = new Image();
                    img.onload = function() {
                        // 短い辺に合わせて正方形のサイズを決定
                        const size = Math.min(img.width, img.height);
                        
                        // 画像処理用の見えないキャンバスを作成
                        const canvas = document.createElement('canvas');
                        canvas.width = size;
                        canvas.height = size;
                        const ctx = canvas.getContext('2d');
                        
                        // 画像の中央を正方形に切り抜いて描画
                        const startX = (img.width - size) / 2;
                        const startY = (img.height - size) / 2;
                        ctx.drawImage(img, startX, startY, size, size, 0, 0, size, size);
                        
                        // 切り抜いた画像をデータURLに変換
                        const dataUrl = canvas.toDataURL();
                        
                        // 対応するキューブの面の背景画像として設定
                        const targetFace = document.querySelector('.face.' + faceClass);
                        targetFace.style.backgroundImage = `url(${dataUrl})`;
                        targetFace.textContent = ''; // 文字を消す
                    }
                    img.src = event.target.result;
                }
                reader.readAsDataURL(file);
            });
        });

        // 4. アニメーション（無造作な回転）
        const cube = document.getElementById('cube');
        let time = 0;
        let rotX = 0;
        let rotY = 0;
        let rotZ = 0;

        function animate() {
            time += 0.01;
            
            // X, Y, Z軸の回転速度を微妙に変え、サイン波を混ぜて無造作に回す
            rotX += 0.4 + Math.sin(time * 0.5) * 0.2;
            rotY += 0.6 + Math.cos(time * 0.3) * 0.3;
            rotZ += 0.3 + Math.sin(time * 0.7) * 0.1;

            // CSSのtransformを使ってキューブを回転させる
            cube.style.transform = `rotateX(${rotX}deg) rotateY(${rotY}deg) rotateZ(${rotZ}deg)`;

            requestAnimationFrame(animate);
        }

        // アニメーションスタート
        animate();
    </script>

</body>
</html>
